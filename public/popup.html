<!DOCTYPE html>
<html>
  <head>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 320px;
        min-height: 400px;
        font-family: sans-serif;
        background: #0f0f1a;
        color: #fff;
      }

      .page {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        min-height: 400px;
        gap: 16px;
      }

      .page.active {
        display: flex;
      }

      .logo {
        font-size: 40px;
        margin-bottom: 8px;
      }

      h2 {
        font-size: 20px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 4px;
      }

      p.subtitle {
        font-size: 13px;
        color: #888;
        text-align: center;
        margin-bottom: 12px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: opacity 0.2s;
      }

      .btn:hover { opacity: 0.85; }

      .btn-primary {
        background: #6c5ce7;
        color: #fff;
      }

      .btn-secondary {
        background: #1e1e30;
        color: #fff;
        border: 1px solid #333;
      }

      .back-btn {
        background: none;
        border: none;
        color: #888;
        font-size: 12px;
        cursor: pointer;
        margin-top: 8px;
        text-decoration: underline;
      }

      .back-btn:hover { color: #fff; }
    </style>
  </head>
  <body>

    <!-- PAGE 1 -->
    <div class="page active" id="page1">
       <img src="./icon.png" alt="SOLi Logo" />
      <h2>Welcome</h2>
      <p class="subtitle">Set up your wallet to get started</p>
      <button class="btn btn-primary" id="btnCreateWallet">+ Create a New Wallet</button>
      <button class="btn btn-secondary" id="btnHaveWallet">I Already Have a Wallet</button>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
       <img src="./icon.png" alt="SOLi Logo" />
      <h2>Choose Setup Method</h2>
      <p class="subtitle" id="page2Subtitle">How would you like to continue?</p>
      <button class="btn btn-primary" id="btnEmail">Continue with Email</button>
      <button class="btn btn-secondary" id="btnRecovery">Create a Recovery Phrase Wallet</button>
      <button class="back-btn" id="btnBack">Back</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
